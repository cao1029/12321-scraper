name: 12321 Scraper

on:
  schedule:
    # Every hour (Python script checks 8:00-24:00 China time window)
    - cron: "0 * * * *"
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scraped_data.csv reports/report.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "[auto] scrape $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          # Retry push up to 3 times to handle concurrent Pages deployments
          for i in 1 2 3; do
            if git pull --rebase origin master 2>/dev/null && git push 2>/dev/null; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Push failed after 3 attempts"
          exit 1
