name: 12321 Scraper

on:
  schedule:
    # Every hour from 0:00 to 16:00 UTC (= 8:00 to 24:00 China time)
    - cron: "0 0-16 * * *"
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [main]
    paths:
      - "scraper.py"
      - "template_unified.html"

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scraped_data.csv reports/report.html
          git diff --staged --quiet || git commit -m "[auto] scrape $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git push
