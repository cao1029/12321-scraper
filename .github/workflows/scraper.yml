name: "12321 Scraper"

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 1 * * *"
    - cron: "0 2 * * *"
    - cron: "0 3 * * *"
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python scraper.py

      - name: push
        run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add data/ reports/
          git diff --staged --quiet && exit 0
          git commit -m "[auto] $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin master
          git push

      - name: trigger-next
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          HOUR=$(TZ='Asia/Shanghai' date +'%-H')
          MIN=$(TZ='Asia/Shanghai' date +'%-M')
          
          if [ "$HOUR" -ge 8 ] && [ "$HOUR" -lt 23 ]; then
            WAIT=$(( (60 - MIN + 5) * 60 ))
            echo "Hour $HOUR, waiting ${WAIT}s until next hour"
            sleep $WAIT
          elif [ "$HOUR" -eq 23 ]; then
            WAIT=$(( (9 * 3600) - (MIN * 60) + 300 ))
            echo "Hour 23 (last), waiting ${WAIT}s until 8am"
            sleep $WAIT
          else
            echo "Hour $HOUR outside window, skipping"
            exit 0
          fi
          
          echo "Triggering next run..."
          gh workflow run scraper.yml -R cao1029/12321-scraper
          echo "Next run triggered!"