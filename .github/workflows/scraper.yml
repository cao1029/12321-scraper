name: 12321 Scraper

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: scraper-chain
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scraper.py
      - name: push
        continue-on-error: true
        run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add data/ reports/
          git diff --staged --quiet && exit 0
          git commit -m "[auto] $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin master && git push
      - name: trigger
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const waitMin = 2;
            console.log(`Test mode: sleeping ${waitMin} minutes...`);
            await new Promise(r => setTimeout(r, waitMin * 60000));
            
            console.log('Triggering next run...');
            const resp = await github.rest.actions.createWorkflowDispatch({
              owner: 'cao1029',
              repo: '12321-scraper',
              workflow_id: 'scraper.yml',
              ref: 'master'
            });
            console.log(`Response status: ${resp.status}`);
            console.log('SUCCESS - Chain verified!');