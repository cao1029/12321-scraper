name: "12321 Scraper"

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 1 * * *"
    - cron: "0 2 * * *"
    - cron: "0 3 * * *"
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python scraper.py

      - name: push
        run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add data/ reports/
          git diff --staged --quiet && exit 0
          git commit -m "[auto] $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin master
          git push

      - name: trigger-next
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          HOUR=$(TZ='Asia/Shanghai' date +'%-H')
          MIN=$(TZ='Asia/Shanghai' date +'%-M')
          echo "Current China time: ${HOUR}:$(printf '%02d' $MIN)"
          
          # Calculate target next hour
          if [ "$HOUR" -ge 8 ] && [ "$HOUR" -lt 23 ]; then
            TARGET=$((HOUR + 1))
          else
            TARGET=8  # Next 8am
          fi
          
          # Calculate wait time
          NOW_MINUTES=$((HOUR * 60 + MIN))
          TARGET_MINUTES=$((TARGET * 60))
          if [ "$TARGET" -le "$HOUR" ]; then
            TARGET_MINUTES=$((TARGET_MINUTES + 24 * 60))
          fi
          WAIT_MINUTES=$((TARGET_MINUTES - NOW_MINUTES))
          
          # Cap at 5 hours to stay within 6h job timeout
          if [ "$WAIT_MINUTES" -gt 300 ]; then
            echo "Wait (${WAIT_MINUTES}min) exceeds 5h cap, limiting to 300min"
            WAIT_MINUTES=300
          fi
          
          WAIT_SEC=$((WAIT_MINUTES * 60))
          echo "Target hour: $TARGET, waiting ${WAIT_MINUTES}min (${WAIT_SEC}s)"
          sleep $WAIT_SEC
          
          echo "Triggering next run..."
          gh workflow run scraper.yml -R cao1029/12321-scraper
          echo "Done!"