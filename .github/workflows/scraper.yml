name: 12321 Scraper

on:
  schedule:
    - cron: "0 0,8,16 * * *"
    - cron: "0 1,9,17 * * *"
    - cron: "0 2,10,18 * * *"
    - cron: "0 3,11,19 * * *"
  workflow_dispatch:

concurrency:
  group: scraper-chain
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scraper.py
      - name: push
        continue-on-error: true
        run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add data/ reports/
          git diff --staged --quiet && exit 0
          git commit -m "[auto] $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin master && git push
      - name: chain
        run: |
          HOUR=$(TZ='Asia/Shanghai' date +'%-H')
          MIN=$(TZ='Asia/Shanghai' date +'%-M')
          echo "Time: ${HOUR}:$(printf '%02d' $MIN) China"
          
          if [ "$HOUR" -ge 8 ] && [ "$HOUR" -lt 23 ]; then
            TARGET=$((HOUR + 1))
          else
            TARGET=8
          fi
          
          NW=$((HOUR * 60 + MIN))
          TW=$((TARGET * 60))
          if [ "$TARGET" -le "$HOUR" ]; then TW=$((TW + 24 * 60)); fi
          WAIT=$((TW - NW))
          if [ "$WAIT" -gt 300 ]; then WAIT=300; fi
          
          echo "Next: ${TARGET}:00, wait ${WAIT}min"
          sleep $((WAIT * 60))
          
          python3 -c "
import requests
r = requests.post(
    'https://api.github.com/repos/cao1029/12321-scraper/actions/workflows/284294670/dispatches',
    headers={'Authorization': 'Bearer ${{ secrets.GH_PAT }}', 'Accept': 'application/vnd.github+json'},
    json={'ref': 'master'}
)
print(f'HTTP {r.status_code}')
assert r.status_code == 204, f'Failed: {r.text}'
print('Chain OK')
"