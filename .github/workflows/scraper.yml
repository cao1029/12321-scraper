name: 12321 Scraper

on:
  schedule:
    # Every hour on the hour. scraper.py gates to 08:00-24:00 China time internally.
    # NOTE: Do NOT use hour ranges/lists (0-15 or 0,1,2...) — GitHub scheduler
    # silently drops most firings with restricted hour syntax. Only bare * works reliably.
    - cron: "0 * * * *"
    # 23:55 China time extra run
    - cron: "55 15 * * *"
  workflow_dispatch:

concurrency:
  group: scraper-chain
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scraper.py
      - name: push
        run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add data/ reports/
          git diff --staged --quiet && exit 0
          git commit -m "[auto] $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin master && git push
