name: "12321 Scraper"

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 1 * * *"
    - cron: "0 2 * * *"
    - cron: "0 3 * * *"
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:

concurrency:
  group: scraper-chain
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python scraper.py

      - name: push
        continue-on-error: true
        run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add data/ reports/
          git diff --staged --quiet && exit 0
          git commit -m "[auto] $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin master && git push

      - name: trigger-next
        env:
          PAT: ${{ secrets.GH_PAT }}
        run: |
          HOUR=$(TZ='Asia/Shanghai' date +'%-H')
          MIN=$(TZ='Asia/Shanghai' date +'%-M')
          echo "Current time: ${HOUR}:$(printf '%02d' $MIN) China"
          
          if [ "$HOUR" -ge 8 ] && [ "$HOUR" -lt 23 ]; then
            TARGET=$((HOUR + 1))
          else
            TARGET=8
          fi
          
          NOW_MIN=$((HOUR * 60 + MIN))
          TGT_MIN=$((TARGET * 60))
          if [ "$TARGET" -le "$HOUR" ]; then
            TGT_MIN=$((TGT_MIN + 24 * 60))
          fi
          WAIT_MIN=$((TGT_MIN - NOW_MIN))
          
          if [ "$WAIT_MIN" -gt 300 ]; then
            WAIT_MIN=300
          fi
          
          echo "Target hour: ${TARGET}:00, waiting ${WAIT_MIN} min"
          sleep $((WAIT_MIN * 60))
          
          echo "Triggering next via API..."
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/cao1029/12321-scraper/actions/workflows/284294670/dispatches" \
            -d '{"ref":"master"}')
          
          echo "API response: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "204" ]; then
            echo "Chain continues!"
          else
            echo "ERROR: unexpected response code $HTTP_CODE"
            exit 1
          fi