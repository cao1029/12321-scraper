name: "12321 Scraper"

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: scrape
        run: python scraper.py

      - name: push
        run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add data/ reports/
          git diff --staged --quiet && exit 0
          git commit -m "[auto] $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin master
          git push

      - name: schedule-next
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Calculate seconds until next hour (China time 8:00-24:00)
          HOUR=$(TZ='Asia/Shanghai' date +'%-H')
          if [ "$HOUR" -ge 8 ] && [ "$HOUR" -lt 23 ]; then
            # Within window, schedule next run in ~1 hour
            DELAY="3600"
          elif [ "$HOUR" -eq 23 ]; then
            # Last run of day, schedule next run at 8am tomorrow (~9 hours)
            DELAY="32400"
          else
            # Outside window (0-7), schedule next run at 8am
            H=$(TZ='Asia/Shanghai' date +'%-H')
            DELAY=$(( (8 - H + 24) % 24 * 3600 ))
            if [ "$DELAY" -eq 0 ]; then DELAY=3600; fi
          fi
          
          echo "Current China hour: $HOUR"
          echo "Scheduling next run in $DELAY seconds"
          
          # Sleep until next run time minus 30s buffer
          sleep $((DELAY - 30))
          
          # Trigger next run via API
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/cao1029/12321-scraper/actions/workflows/284294670/dispatches" \
            -d '{"ref":"master"}'
          
          echo "Next run triggered!"