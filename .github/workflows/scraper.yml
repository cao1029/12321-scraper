name: "12321 Scraper"

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 1 * * *"
    - cron: "0 2 * * *"
    - cron: "0 3 * * *"
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python scraper.py

      - name: push
        run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add data/ reports/
          git diff --staged --quiet && exit 0
          git commit -m "[auto] $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin master
          git push

      - name: trigger-next
        run: |
          # Calculate seconds until next hour (China time)
          HOUR=$(TZ='Asia/Shanghai' date +'%-H')
          MIN=$(TZ='Asia/Shanghai' date +'%-M')
          
          if [ "$HOUR" -ge 8 ] && [ "$HOUR" -lt 23 ]; then
            # Within window: wait until next hour minus current minute
            WAIT=$(( (60 - MIN + 5) * 60 ))
            echo "Within window (hour $HOUR), waiting ${WAIT}s for next hour..."
            sleep $WAIT
          elif [ "$HOUR" -eq 23 ]; then
            # Last run: wait 9 hours until 8am
            WAIT=$(( (9 * 3600) - (MIN * 60) + 300 ))
            echo "Last run (hour 23), waiting ${WAIT}s for 8am..."
            sleep $WAIT
          else
            echo "Hour $HOUR outside window (0-7), exiting without scheduling"
            exit 0
          fi
          
          # Trigger next run
          echo "Triggering next workflow run..."
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ github.workflow_id }}/dispatches" \
            -d '{"ref":"${{ github.ref_name }}"}'
          echo "Done!"