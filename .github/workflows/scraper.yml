name: 12321 Scraper

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: scraper-chain
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scraper.py
      - name: push
        continue-on-error: true
        run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add data/ reports/
          git diff --staged --quiet && exit 0
          git commit -m "[auto] $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin master && git push
      - name: trigger
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const now = new Date();
            const cnHour = (now.getUTCHours() + 8) % 24;
            const cnMin = now.getUTCMinutes();
            console.log(`Time: ${cnHour}:${String(cnMin).padStart(2,'0')} China`);
            
            let targetHour, targetMin;
            if (cnHour >= 8 && cnHour < 23) {
              targetHour = cnHour + 1;
              targetMin = 0;
            } else if (cnHour === 23 && cnMin < 55) {
              targetHour = 23;
              targetMin = 55;
            } else {
              targetHour = 8;
              targetMin = 0;
            }
            
            let nowMin = cnHour * 60 + cnMin;
            let tgtMin = targetHour * 60 + targetMin;
            if (targetHour < cnHour || (targetHour === cnHour && targetMin <= cnMin)) {
              tgtMin += 24 * 60;
            }
            let waitMin = Math.min(tgtMin - nowMin, 300);
            
            console.log(`Target: ${targetHour}:${String(targetMin).padStart(2,'0')}, waiting ${waitMin}min`);
            await new Promise(r => setTimeout(r, waitMin * 60000));
            
            await github.rest.actions.createWorkflowDispatch({
              owner: 'cao1029',
              repo: '12321-scraper',
              workflow_id: 'scraper.yml',
              ref: 'master'
            });
            console.log('Chain continues!');
