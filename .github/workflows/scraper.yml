name: 12321 Scraper

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: scraper-chain
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scraper.py
      - name: push
        continue-on-error: true
        run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add data/ reports/
          git diff --staged --quiet && exit 0
          git commit -m "[auto] $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin master && git push
      - name: wait
        run: |
          HOUR=$(TZ='Asia/Shanghai' date +'%-H')
          MIN=$(TZ='Asia/Shanghai' date +'%-M')
          echo "Time: ${HOUR}:$(printf '%02d' $MIN) China"
          if [ "$HOUR" -ge 8 ] && [ "$HOUR" -lt 23 ]; then TARGET=$((HOUR + 1)); else TARGET=8; fi
          NW=$((HOUR * 60 + MIN)); TW=$((TARGET * 60))
          if [ "$TARGET" -le "$HOUR" ]; then TW=$((TW + 24 * 60)); fi
          WAIT=$((TW - NW))
          if [ "$WAIT" -gt 300 ]; then WAIT=300; fi
          echo "Target: ${TARGET}:00, wait ${WAIT}min"
          echo "WAIT_MINUTES=$WAIT" >> $GITHUB_ENV
      - name: trigger
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const waitMin = parseInt(process.env.WAIT_MINUTES || '60');
            console.log(`Sleeping ${waitMin} minutes...`);
            await new Promise(r => setTimeout(r, waitMin * 60000));
            console.log('Triggering next...');
            await github.rest.actions.createWorkflowDispatch({
              owner: 'cao1029',
              repo: '12321-scraper',
              workflow_id: 'scraper.yml',
              ref: 'master'
            });
            console.log('Chain continues!');