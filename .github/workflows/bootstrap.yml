name: Bootstrap

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Create real workflow via git commit
        run: |
          mkdir -p .github/workflows
          cat > .github/workflows/scraper.yml << 'ENDOFWORKFLOW'
          name: "12321 Scraper"

          on:
            schedule:
              - cron: "0 * * * *"
            workflow_dispatch:

          jobs:
            scrape:
              runs-on: ubuntu-latest
              permissions:
                contents: write
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: "3.11"
                - run: pip install requests
                - run: python scraper.py
                - name: push
                  run: |
                    git config user.name "actions"
                    git config user.email "actions@github.com"
                    git add data/ reports/
                    git diff --staged --quiet && exit 0
                    git commit -m "[auto] $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
                    git pull --rebase origin master
                    git push
          ENDOFWORKFLOW
          
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add .github/workflows/scraper.yml
          git commit -m "Register workflow via git commit (triggers schedule)"
          git pull --rebase origin master
          git push
          echo "Workflow committed via git. Schedule should activate now."